# HTTP → HTTPS redirect + certbot challenge
server {
    listen 80;
    server_name logic-architecture.com www.logic-architecture.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://logic-architecture.com$request_uri;
    }
}

# HTTPS — основной сервер
server {
    listen 443 ssl http2;
    server_name logic-architecture.com;

    ssl_certificate /etc/letsencrypt/live/logic-architecture.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/logic-architecture.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    root /usr/share/nginx/html;
    index index.html;

    # Language prefix routing — serve same file without prefix
    location ~ ^/(ru|en|vi|zh)/(.+)$ {
        try_files /$2/index.html /$2 =404;
    }
    location ~ ^/(ru|en|vi|zh)/?$ {
        try_files /index.html =404;
    }

    # Multi-page routing
    location / {
        try_files $uri $uri/index.html $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    location /api/ {
        proxy_pass http://api:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

# www → без-www редирект
server {
    listen 443 ssl http2;
    server_name www.logic-architecture.com;

    ssl_certificate /etc/letsencrypt/live/logic-architecture.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/logic-architecture.com/privkey.pem;

    return 301 https://logic-architecture.com$request_uri;
}
